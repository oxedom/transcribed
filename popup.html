<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>transcribed settings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Newsreader:wght@600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="popup.css" />
    <style>
      /* Popup is fixed-width; the body provides the visible chrome. */
      html, body { width: 360px; }
      body { margin: 0; font-family: "Inter", system-ui, sans-serif; }
      .brand-title { font-family: "Newsreader", serif; }
    </style>
  </head>
  <body class="bg-background text-foreground">
    <main class="px-4 pt-6 pb-4 space-y-4">
      <header class="flex items-center gap-2.5">
        <img src="icon.svg" alt="" width="36" height="36" class="shrink-0" />
        <h1 class="brand-title text-4xl font-semibold leading-none">transcribed</h1>
      </header>

      <section class="space-y-3">
        <div class="flex items-start justify-between gap-3">
          <label for="toggle-prepend" class="text-sm font-medium">Add prompt before transcript</label>
          <button
            id="toggle-prepend"
            type="button"
            role="switch"
            aria-checked="true"
            class="switch-root"
            data-state="checked"
          >
            <span class="switch-thumb"></span>
          </button>
        </div>
      </section>

      <section class="space-y-2">
        <div class="flex items-center justify-between">
          <label for="prompt-text" class="text-sm font-medium">Prompt</label>
          <button
            id="reset-btn"
            type="button"
            class="text-xs text-muted-foreground hover:text-foreground underline-offset-2 hover:underline"
          >
            Reset to default
          </button>
        </div>
        <textarea
          id="prompt-text"
          rows="7"
          class="w-full rounded-md border border-input bg-card text-card-foreground p-2 text-xs leading-relaxed focus:outline-none focus:ring-2 focus:ring-ring resize-y"
          spellcheck="false"
        ></textarea>
      </section>

      <section class="space-y-3">
        <div class="flex items-start justify-between gap-3">
          <label for="toggle-open-chat" class="text-sm font-medium">Open AI chat after copy</label>
          <button
            id="toggle-open-chat"
            type="button"
            role="switch"
            aria-checked="false"
            class="switch-root"
            data-state="unchecked"
          >
            <span class="switch-thumb"></span>
          </button>
        </div>
        <select
          id="chat-target"
          hidden
          class="w-full rounded-md border border-input bg-card text-card-foreground p-2 text-xs focus:outline-none focus:ring-2 focus:ring-ring"
        >
          <option value="chatgpt">ChatGPT</option>
          <option value="claude">Claude</option>
          <option value="gemini">Gemini</option>
        </select>
      </section>

      <button
        id="save-btn"
        type="button"
        disabled
        aria-live="polite"
        class="w-full px-3 py-2 text-sm font-medium rounded-md bg-primary text-primary-foreground hover:opacity-90 disabled:opacity-40 disabled:cursor-not-allowed transition-opacity"
      >
        Save
      </button>

      <p class="text-xs text-center text-muted-foreground inline-flex items-center justify-center gap-1 w-full">
        Made with <span aria-label="love" role="img">❤️</span> by
        <a
          href="https://brinked.ai"
          target="_blank"
          rel="noopener noreferrer"
          class="hover:underline underline-offset-2"
        ><span style="color:hsl(var(--primary))">brinked</span><span style="color:hsl(var(--accent))">.ai</span></a>
      </p>
    </main>

    <dialog
      id="reset-dialog"
      class="rounded-lg border border-border bg-popover text-popover-foreground p-0 backdrop:bg-black/40 max-w-xs"
    >
      <form method="dialog" class="p-4 space-y-3">
        <h2 class="text-sm font-semibold">Restore the default prompt?</h2>
        <p class="text-xs text-muted-foreground">
          Your current prompt will be replaced. You can always edit it again.
        </p>
        <div class="flex justify-end gap-2">
          <button
            value="cancel"
            class="px-3 py-1.5 text-xs rounded-md border border-input hover:bg-secondary"
          >
            Cancel
          </button>
          <button
            value="confirm"
            class="px-3 py-1.5 text-xs rounded-md bg-destructive text-destructive-foreground hover:opacity-90"
          >
            Reset
          </button>
        </div>
      </form>
    </dialog>

    <script src="defaults.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
